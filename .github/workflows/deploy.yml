name: Build and deploy expense_graphql

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'package.json'
      - 'package-lock.json'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22          # ← Match your Dockerfile node version

      - name: Build frontend assets
        run: |
          npm ci --prefix frontend --no-audit --no-fund
          NODE_OPTIONS=--max_old_space_size=1048 npm run build --prefix frontend

      - name: Copy repository to EC2
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          source: "."
          target: "~/expense_graphql"
          recursive: true
          rm: true
          exclude: |
            .git
            node_modules
            frontend/node_modules
            frontend/src           # ← No need to copy source files
            .github
            .env

      - name: Deploy via docker compose on EC2
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          command_timeout: 10m      # ← Add timeout (build no longer happens here)
          script: |
            mkdir -p ~/expense_graphql
            cd ~/expense_graphql

            cat > .env <<EOF
            MONGODB_URI=${{ secrets.MONGODB_URI }}
            SESSION_SECRET=${{ secrets.SESSION_SECRET }}
            PORT=4000
            EOF

            sudo apt-get update
            sudo apt-get install -y nginx
            sudo systemctl enable nginx
            sudo systemctl start nginx

            sudo tee /etc/nginx/conf.d/expense_graphql.conf > /dev/null <<'EOF'
            server {
              listen 80;
              server_name _;

              location / {
                proxy_pass http://127.0.0.1:4000;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection 'upgrade';
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_cache_bypass $http_upgrade;
              }
            }
            EOF

            sudo nginx -t
            sudo systemctl reload nginx

            sudo docker compose down || true
            sudo docker compose up -d --build --remove-orphans  # ← Fast now, no vite build